# LibreLane Classic-flow hardening config for the vecu_softmax macro.
#
# STATUS: REAL RTL (MULTI-CYCLE) — vecu_softmax is the decode online-softmax
# slice: it buffers a score row (up to N fp16 scores), does the streaming
# max-subtract + exp-LUT + normalize, and emits N fp16 attention weights. Passed
# the RTL cross-block cosim (architecture/rtl/tb/tb_chip_cosim.sv, BLOCK 2d).
# Re-targeted to GF180MCU here. The exp is a ~2%-accurate LUT (documented tol).
#
# Provenance (source repo, branch, commit): ../rtl/blocks/PROVENANCE.md
#
# MULTI-CYCLE REBALANCE: the exp datapath is now a micro-sequenced FSM
# (S_COMPUTE / S_EMIT) executing ONE fp32 op per cycle, so the longest reg-to-reg
# path is a single fp32 add/mult (~half the earlier 3-stage version's longest
# stage). This lets the block close the ss corner with NORMAL-effort resizing and
# a TIGHTER clock, reclaiming the area the aggressive ss-close resize on the
# 3-stage version had bloated (101k cells / 1.49 mm2).

meta:
  version: 3
  flow: Classic

DESIGN_NAME: vecu_softmax

PDK: gf180mcuD


VERILOG_FILES:
  - dir::../../../rtl/vecu_softmax.sv

SYNTH_PARAMETERS:
  - N=8               # max scores per row (row buffer depth)

CLOCK_PORT: clk
CLOCK_NET: clk
CLOCK_PERIOD: 260    # ns — GF180 retime (multi-cycle; ss single-op path closes with margin, normal resizing)

FP_SIZING: relative
FP_CORE_UTIL: 45
PL_TARGET_DENSITY_PCT: 55

DESIGN_IS_CORE: false
IO_DELAY_CONSTRAINT: 2
CLOCK_UNCERTAINTY_CONSTRAINT: 0.1
# normal-effort resizing (the earlier 0.8 hold margin + post-GRT timing resize is
# what bloated the 3-stage version); default hold margin is enough now.
GRT_ALLOW_CONGESTION: true
